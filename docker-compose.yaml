services:
  # -------------------------------
  # Frontend
  # -------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      # NEXT_PUBLIC_* vars must be passed at BUILD TIME — Next.js bakes them
      # into the static bundle during `next build`. env_file alone is not enough.
      args:
        - NEXT_PUBLIC_API_URL=http://smartcaf.tech/api
        - NEXT_PUBLIC_SOCKET_URL=http://smartcaf.tech
    image: caf-client:latest
    container_name: caf-client
    # Nginx handles public exposure — no need to bind port directly
    # ports:
    #   - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - app-network
    restart: unless-stopped

  # -------------------------------
  # Backend
  # -------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    image: zenvy-server:latest
    container_name: zenvy-server
    # Nginx handles public exposure — no need to bind port directly
    # ports:
    #   - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - app-network
    depends_on:
      - redis
    restart: unless-stopped

  # ------------------------------
  # Nginx Reverse Proxy
  # SSL is terminated by Hostinger — nginx handles HTTP only.
  # To re-enable SSL via certs later:
  #   1. Uncomment port 443 below.
  #   2. Mount your cert files (see commented volumes).
  #   3. Swap nginx.conf for the SSL version (see nginx/nginx.conf).
  # ------------------------------
  nginx:
    image: nginx:alpine
    container_name: zenvy-nginx
    ports:
      - "80:80"
      # - "443:443"   # Uncomment when SSL certs are managed locally
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificate volumes — uncomment when activating local SSL:
      # - ./nginx/certs/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      # - ./nginx/certs/privkey.pem:/etc/ssl/private/privkey.pem:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - app-network
    depends_on:
      - client
      - server
    restart: unless-stopped

  # -------------------------------
  # Redis
  # -------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: zenvy-redis
    # Bind to localhost only — not exposed to the public internet
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  redis_data: