services:
  # -------------------------------
  # Frontend
  # -------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      # NEXT_PUBLIC_* vars must be passed at BUILD TIME — Next.js bakes them
      # into the static bundle during `next build`. env_file alone is not enough.
      args:
        - NEXT_PUBLIC_API_URL=https://smartcaf.tech/api
        - NEXT_PUBLIC_SOCKET_URL=https://smartcaf.tech
    image: caf-client:latest
    container_name: caf-client
    # Nginx handles public exposure — no need to bind port directly
    # ports:
    #   - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - app-network
    restart: unless-stopped

  # -------------------------------
  # Backend
  # -------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    image: caf-server:latest
    container_name: caf-server
    # Nginx handles public exposure — no need to bind port directly
    # ports:
    #   - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - app-network
    depends_on:
      - redis
    restart: unless-stopped

  # ------------------------------
  # Nginx Reverse Proxy (SSL terminated here)
  # Certs from Cloudflare Origin Certificate must be placed at:
  #   ./nginx/certs/fullchain.pem
  #   ./nginx/certs/privkey.pem
  # ------------------------------
  nginx:
    image: nginx:alpine
    container_name: caf-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Cloudflare Origin Certificate files
      - ./nginx/certs/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - ./nginx/certs/privkey.pem:/etc/ssl/private/privkey.pem:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - app-network
    depends_on:
      - client
      - server
    restart: unless-stopped

  # -------------------------------
  # Redis
  # -------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: caf-redis
    # Bind to localhost only — not exposed to the public internet
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  redis_data: